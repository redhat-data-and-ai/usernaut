---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: usernaut-validating-webhook-configuration
webhooks:
- name: unified-webhook.operator.dataverse.redhat.com
  admissionReviewVersions:
  - v1
  failurePolicy: Fail
  sideEffects: None
  timeoutSeconds: 30
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-operator-dataverse-redhat-com-v1alpha1
  rules:
  - operations:
    - CREATE
    - UPDATE
    - DELETE
    apiGroups:
    - operator.dataverse.redhat.com
    apiVersions:
    - v1alpha1
    resources:
    - "*/*"
