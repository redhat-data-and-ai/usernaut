apiVersion: operator.dataverse.redhat.com/v1alpha1
kind: Group
metadata:
  labels:
    app.kubernetes.io/name: usernaut
    app.kubernetes.io/managed-by: kustomize
  name: dataverse-aggregate-mygroupquerybased
  namespace: usernaut
spec:
  group_name: dataverse-aggregate-mygroupquerybased
  # ldap_query: (&(manager=uid=pbhattac,ou=users,dc=redhat,dc=com)(&(title=*senior*)))
  members:
    ldap_query:
      operator: and
      filters:
        - key: manager
          criteria: equals
          value: pbhattac  # user ID only (expanded to uid=pbhattac,<baseUserDN>)
        - key: title
          criteria: contains
          value: principal
    users:
      - subhatta
      - arijroy
  backends:
  - name: snowflake
    type: snowflake
